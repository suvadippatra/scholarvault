name: Build Release

on:
  push:
    tags:
      - 'v*' # Automatically trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manually triggering from the Actions tab
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: false
      version_tag:
        description: 'Version Tag for Release (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build_release:
    name: Build Signed Release APK & AAB
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure valid Gradle wrapper
        run: |
          rm -rf gradle/wrapper/
          gradle wrapper
          chmod +x gradlew

      - name: Decode Keystore from Base64 Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            # Decode the base64 keystore and place it in the root directory
            echo "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > my-upload-key.jks
            echo "Keystore successfully decoded."
          else
            echo "KEYSTORE_BASE64 secret is missing. The build may fail if signing is required."
          fi

      - name: Build Release APK and Bundle (AAB)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          # The keystore is now at the root directory, so the Gradle fallback path will naturally find it
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        with:
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.version_tag || github.ref_name }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
