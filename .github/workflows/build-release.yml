name: Build Release

on:
  push:
    tags:
      - 'v*' # Automatically trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manually triggering from the Actions tab

jobs:
  build_release:
    name: Build Signed Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode Keystore from Base64 Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            # Decode the base64 keystore and place it in the root directory
            echo $KEYSTORE_BASE64 | base64 --decode > my-upload-key.jks
            echo "Keystore successfully decoded."
          else
            echo "KEYSTORE_BASE64 secret is missing. The build may fail if signing is required."
          fi

      - name: Build Release APK and Bundle (AAB)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          # The keystore is now at the root directory, so the Gradle fallback path will naturally find it
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
