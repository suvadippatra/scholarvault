name: Create GitHub Release

on:
  push:
    tags:
      - 'v*' # Automatically trigger on version tags (e.g., v1.0.0)
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag for Release (e.g., v1.0.0 or leave blank to use run number)'
        required: false
        type: string

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure valid Gradle wrapper
        run: |
          rm -rf gradle/wrapper/
          gradle wrapper
          chmod +x gradlew

      - name: Decode Keystore from Base64 Secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > my-upload-key.jks
            echo "Keystore successfully decoded for signing."
          else
            echo "Warning: KEYSTORE_BASE64 secret is missing. The resulting APKs may not be fully signed."
          fi

      - name: Build Release APK and Bundle (AAB)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Determine Version Tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.version_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.version_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
